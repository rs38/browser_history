name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite
        run: python -m pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter-server

      - name: Build JupyterLite site
        run: jupyter lite build --contents browser_history_domain_overview.ipynb --output-dir docs

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Upload Pages artifact (for deploy)
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Upload build artifact (for PR inspection)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: jupyterlite-docs
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
